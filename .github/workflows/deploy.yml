name: Deploy — App Funcionários MH

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Instalar dependências
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy para Vercel
        run: npx vercel deploy --prod --token "${{ secrets.VERCEL_TOKEN }}" --yes --scope nicolasnick2903-stacks-projects
